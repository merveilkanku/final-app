<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DashMeals RDC</title>
    <!-- LEAFLET CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Lato:wght@300;400;700;900&family=Montserrat:wght@300;400;500;600;700;900&family=Open+Sans:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <style>
      /* GLOBAL SHARPNESS FIXES */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      /* Fix pour les images générales, mais exclusion de la carte */
      img {
        image-rendering: -webkit-optimize-contrast;
      }
      
      /* LEAFLET SPECIFIC FIXES */
      .leaflet-container img.leaflet-tile {
        image-rendering: auto !important; 
        mix-blend-mode: normal !important;
      }
      
      /* Force le moteur de rendu GPU pour éviter le flou de sous-pixel */
      #root {
        isolation: isolate;
      }
      
      /* Leaflet Z-Index fix for modals */
      .leaflet-pane {
        z-index: 10 !important;
      }
      .leaflet-bottom, .leaflet-top {
        z-index: 20 !important;
      }
    </style>
    <link rel="stylesheet" href="./index.css">
</head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
